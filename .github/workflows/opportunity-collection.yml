name: Opportunity Hunter — Daily Collection

on:
  schedule:
    # 06:00 UAE time (UTC+4) every day.
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run collection engine
        working-directory: AOS/opportunity-hunter/runtime
        run: python3 collect.py

      - name: Commit updated AOS data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AOS/
          if git diff --cached --quiet; then
            echo "No new opportunities today; nothing to commit."
          else
            git commit -m "Opportunity Hunter: daily automated collection ($(date -u +%F))"
            git push
          fi
